version: '3.9'

services:
  redis:
    image: redis:7
    ports:
      - "6380:6379"
    networks:
      - app-net

  payment-db:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: payment
    ports:
      - "3308:3306"
    networks:
      - app-net
    healthcheck:
      test: ["CMD", "mysql", "-h", "127.0.0.1", "-uroot", "-proot", "-e", "SELECT 1"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 30s

  payment-service:
    build: .
    ports:
      - "8082:8081"
    restart: on-failure
    depends_on:
      payment-db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - app-net

networks:
  app-net:
    driver: bridge