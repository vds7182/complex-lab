apiVersion: apps/v1
kind: Deployment

metadata:
  name: event-service

spec:
  replicas: 1

  selector:
    matchLabels:
      app: event-service

  template:
    metadata:
      labels:
        app: event-service

    spec:
      containers:
        - name: event-service
          image: event-service:1.2
          imagePullPolicy: Never

          ports:
            - containerPort: 8081

          env:
            - name: SPRING_DATASOURCE_URL
              value: jdbc:mysql://event-db:3306/event

            - name: SPRING_DATASOURCE_USERNAME
              value: root

            - name: SPRING_DATASOURCE_PASSWORD
              value: root

            - name: SPRING_DATA_REDIS_HOST
              value: redis