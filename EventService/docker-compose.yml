version: '3.9'

services:

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  event-db:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD:
      MYSQL_DATABASE: event
    ports:
      - "3307:3306"

  event-service:
    build: ./event-service
    ports:
      - "8081:8081"
    depends_on:
      - redis
      - event-db