version: '3.9'

services:
  redis:
    image: redis:7
    ports:
      - "6379:6379"
    networks:
      - app-net

  event-db:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: event
    ports:
      - "3307:3306"
    networks:
      - app-net
    healthcheck:
      test: ["CMD", "mysql", "-h", "127.0.0.1", "-uroot", "-proot", "-e", "SELECT 1"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 30s

  event-service:
    build: .
    ports:
      - "8081:8081"
    restart: on-failure
    depends_on:
      event-db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - app-net

networks:
  app-net:
    driver: bridge